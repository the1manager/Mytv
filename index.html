<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My TV</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255,255,255,.75);
      --panel: rgba(0,0,0,.72);
      --accent: #e11d48;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #000;
    }

    #adScreen {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 6vw;
      text-align: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.06), transparent 40%),
        linear-gradient(180deg, #0a0a0a, #000 65%);
    }

    #adCard {
      width: min(92vw, 1000px);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: 24px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      padding: 28px;
    }

    #adBadge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 700;
      letter-spacing: .08em;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    #adTitle {
      font-size: clamp(34px, 5vw, 72px);
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 14px;
    }

    #adText {
      font-size: clamp(20px, 2.6vw, 36px);
      line-height: 1.35;
      margin: 0;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 28px 28px 22px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.86) 40%, rgba(0,0,0,.95));
      pointer-events: none;
    }

    #topLeft {
      position: absolute;
      top: 18px;
      left: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 5;
      pointer-events: none;
    }

    #channelTag {
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      padding: 8px 12px;
      border-radius: 10px;
      letter-spacing: .06em;
    }

    #liveTag {
      background: rgba(255,255,255,.12);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    #programTitle {
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 8px;
    }

    #programMeta {
      font-size: clamp(14px, 1.6vw, 20px);
      color: var(--muted);
      margin: 0;
    }

    #emptyState {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      background:
        radial-gradient(circle at center, rgba(255,255,255,.06), transparent 40%),
        linear-gradient(180deg, #111, #000 70%);
    }

    #emptyState h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 54px);
      color: var(--fg);
    }

    #emptyState p {
      margin: 0;
      font-size: clamp(16px, 2vw, 24px);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="topLeft">
      <div id="channelTag">MY TV</div>
      <div id="liveTag">LIVE</div>
    </div>

    <iframe
      id="player"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>

    <div id="adScreen">
      <div id="adCard">
        <div id="adBadge">ADVERTISEMENT</div>
        <h1 id="adTitle">إعلان</h1>
        <p id="adText"></p>
      </div>
    </div>

    <div id="emptyState">
      <div>
        <h1>لا يوجد جدول بعد</h1>
        <p>افتح dashboard.html وأضف عناصر للجدول ثم احفظ schedule.json</p>
      </div>
    </div>

    <div id="overlay">
      <h2 id="programTitle">Loading...</h2>
      <p id="programMeta"></p>
    </div>
  </div>

  <script>
    let schedule = [];

    function toSeconds(timeStr) {
      const [h, m] = timeStr.split(":").map(Number);
      return (h * 3600) + (m * 60);
    }

    function nowSeconds() {
      const d = new Date();
      return (d.getHours() * 3600) + (d.getMinutes() * 60) + d.getSeconds();
    }

    function getVideoId(input) {
      if (!input) return "";
      const trimmed = String(input).trim();

      if (/^[a-zA-Z0-9_-]{11}$/.test(trimmed)) return trimmed;

      const patterns = [
        /[?&]v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /shorts\/([a-zA-Z0-9_-]{11})/,
        /embed\/([a-zA-Z0-9_-]{11})/
      ];

      for (const p of patterns) {
        const m = trimmed.match(p);
        if (m) return m[1];
      }

      return trimmed;
    }

    function getCurrentItem() {
      if (!schedule.length) return null;

      const now = nowSeconds();
      let current = schedule[0];

      for (let i = 0; i < schedule.length; i++) {
        const item = schedule[i];
        if (now >= toSeconds(item.time)) current = item;
      }

      return current;
    }

    function showEmptyState(show) {
      document.getElementById("emptyState").style.display = show ? "flex" : "none";
      document.getElementById("player").style.display = show ? "none" : "block";
      document.getElementById("adScreen").style.display = "none";
      document.getElementById("overlay").style.display = show ? "none" : "block";
    }

    function playVideo(item) {
      const id = getVideoId(item.content);
      const elapsed = Math.max(0, nowSeconds() - toSeconds(item.time));

      document.getElementById("adScreen").style.display = "none";
      document.getElementById("emptyState").style.display = "none";
      document.getElementById("overlay").style.display = "block";
      document.getElementById("player").style.display = "block";

      document.getElementById("player").src =
        `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1&start=${elapsed}`;

      document.getElementById("programTitle").textContent = item.title || "Program";
      document.getElementById("programMeta").textContent = "Video";
    }

    function showAd(item) {
      document.getElementById("player").style.display = "none";
      document.getElementById("emptyState").style.display = "none";
      document.getElementById("overlay").style.display = "block";

      document.getElementById("adScreen").style.display = "flex";
      document.getElementById("adTitle").textContent = item.title || "إعلان";
      document.getElementById("adText").textContent = item.content || "";

      document.getElementById("programTitle").textContent = item.title || "إعلان";
      document.getElementById("programMeta").textContent = "Ad break";
    }

    function renderCurrent() {
      const item = getCurrentItem();

      if (!item) {
        showEmptyState(true);
        return;
      }

      showEmptyState(false);

      if (item.type === "video") {
        playVideo(item);
      } else {
        showAd(item);
      }
    }

    async function loadSchedule() {
      try {
        const res = await fetch("schedule.json", { cache: "no-store" });
        if (!res.ok) throw new Error("schedule.json not found");
        schedule = await res.json();
        schedule.sort((a, b) => a.time.localeCompare(b.time));
      } catch (e) {
        schedule = [];
        console.error(e);
      }

      renderCurrent();
    }

    loadSchedule();
    setInterval(loadSchedule, 60000);
    setInterval(renderCurrent, 15000);
  </script>
</body>
  </html>
