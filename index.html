<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My TV</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255,255,255,.75);
      --panel: rgba(0,0,0,.72);
      --accent: #e11d48;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #000;
    }

    #adScreen {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 6vw;
      text-align: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.06), transparent 40%),
        linear-gradient(180deg, #0a0a0a, #000 65%);
    }

    #adCard {
      width: min(92vw, 1000px);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: 24px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      padding: 28px;
    }

    #adBadge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 700;
      letter-spacing: .08em;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    #adTitle {
      font-size: clamp(34px, 5vw, 72px);
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 14px;
    }

    #adText {
      font-size: clamp(20px, 2.6vw, 36px);
      line-height: 1.35;
      margin: 0;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 28px 28px 22px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.86) 40%, rgba(0,0,0,.95));
      pointer-events: none;
    }

    #topLeft {
      position: absolute;
      top: 18px;
      left: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 5;
      pointer-events: none;
    }

    #channelTag {
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      padding: 8px 12px;
      border-radius: 10px;
      letter-spacing: .06em;
    }

    #liveTag {
      background: rgba(255,255,255,.12);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    #programTitle {
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 8px;
    }

    #programMeta {
      font-size: clamp(14px, 1.6vw, 20px);
      color: var(--muted);
      margin: 0;
    }

    #emptyState {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      background:
        radial-gradient(circle at center, rgba(255,255,255,.06), transparent 40%),
        linear-gradient(180deg, #111, #000 70%);
    }

    #emptyState h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 54px);
      color: var(--fg);
    }

    #emptyState p {
      margin: 0;
      font-size: clamp(16px, 2vw, 24px);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="topLeft">
      <div id="channelTag">MY TV</div>
      <div id="liveTag">LIVE</div>
    </div>

    <iframe
      id="player"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>

    <div id="adScreen">
      <div id="adCard">
        <div id="adBadge">ADVERTISEMENT</div>
        <h1 id="adTitle">إعلان</h1>
        <p id="adText"></p>
      </div>
    </div>

    <div id="emptyState">
      <div>
        <h1>لا يوجد جدول بعد</h1>
        <p>افتح dashboard.html وأضف عناصر للجدول ثم احفظ schedule.json</p>
      </div>
    </div>

    <div id="overlay">
      <h2 id="programTitle">Loading...</h2>
      <p id="programMeta"></p>
    </div>
  </div>

  <script>
    let schedule = [];
let config = null;

function nowSeconds(){
  const d = new Date();
  return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
}

function load(){
  fetch("schedule.json")
    .then(r=>r.json())
    .then(data=>{
      config = data;
      run();
      setInterval(run, 10000);
    });
}

function run(){
  if(!config) return;

  const now = new Date();
  const currentHour = now.getHours();

  // قبل وقت البداية → توقف
  if(currentHour < config.startHour){
    document.getElementById("player").style.display="none";
    document.getElementById("adScreen").style.display="none";
    return;
  }

  const startSeconds = config.startHour * 3600;

  const elapsedMinutes =
    Math.floor((nowSeconds() - startSeconds) / 60);

  const index =
    Math.floor(elapsedMinutes / config.durationMinutes);

  // انتهت القناة
  if(index >= config.videos.length){
    document.getElementById("player").style.display="none";
    document.getElementById("adScreen").style.display="none";
    return;
  }

  const videoId = config.videos[index];

  document.getElementById("player").style.display="block";
  document.getElementById("player").src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&rel=0`;
}

load();  </script>
</body>
  </html>
